services:
  db:
    image: postgres:16
    container_name: cck_local_db
    environment:
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-furniture}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_POSTGRES_USER:-app} -d ${LOCAL_POSTGRES_DB:-furniture}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5433:5432"
    restart: unless-stopped
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    networks:
      - app_net

  api:
    build:
      context: ./cck-mobilya-backend-main
    container_name: cck_local_api
    environment:
      APP_ENV: dev
      PROJECT_NAME: CCK Mobilya API
      DATABASE_URL: postgresql+psycopg2://${LOCAL_POSTGRES_USER:-app}:${LOCAL_POSTGRES_PASSWORD:-app}@db:5432/${LOCAL_POSTGRES_DB:-furniture}
      DATABASE_URL_TEST: postgresql+psycopg2://${LOCAL_POSTGRES_USER:-app}:${LOCAL_POSTGRES_PASSWORD:-app}@db:5432/${LOCAL_POSTGRES_DB_TEST:-furniture_test}
      CORS_ORIGINS: '${LOCAL_CORS_ORIGINS:-["http://localhost:8080"]}'
      JWT_SECRET_KEY: ${LOCAL_JWT_SECRET_KEY:-local-dev-secret}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ""
      SMTP_TO: ""
      SMTP_USE_TLS: "true"
      SMTP_USE_SSL: "false"
      STORAGE_BACKEND: local
      MEDIA_ROOT: media
      MEDIA_URL_PREFIX: media
      APP_BASE_URL: ${LOCAL_APP_BASE_URL:-http://localhost:8080}
      AWS_REGION: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_SESSION_TOKEN: ""
      S3_BUCKET_NAME: ""
      S3_PUBLIC_BASE_URL: ""
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-furniture}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-app}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - ./cck-mobilya-backend-main/media:/app/media
    networks:
      - app_net

  web:
    build:
      context: ./cckids-frontend-website-main
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8080}
        NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL:-http://localhost:8080}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000}
        NEXT_DISABLE_IMAGE_OPTIMIZATION: ${NEXT_DISABLE_IMAGE_OPTIMIZATION:-true}
    container_name: cck_local_web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8080}
      NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL:-http://localhost:8080}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000}
      NEXT_DISABLE_IMAGE_OPTIMIZATION: ${NEXT_DISABLE_IMAGE_OPTIMIZATION:-true}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
      PORT: "3000"
    depends_on:
      - api
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: cck_local_nginx
    depends_on:
      - web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.local.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - app_net

volumes:
  pgdata_local:

networks:
  app_net:
    driver: bridge
