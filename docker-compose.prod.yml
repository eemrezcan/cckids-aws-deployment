services:
  api:
    build:
      context: ./cck-mobilya-backend-main
    container_name: cck_api
    env_file:
      - ./cck-mobilya-backend-main/.env.prod
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - app_net

  web:
    build:
      context: ./cckids-frontend-website-main
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-}
        NEXT_DISABLE_IMAGE_OPTIMIZATION: ${NEXT_DISABLE_IMAGE_OPTIMIZATION:-false}
    container_name: cck_web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-}
      NEXT_DISABLE_IMAGE_OPTIMIZATION: ${NEXT_DISABLE_IMAGE_OPTIMIZATION:-false}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: cck_nginx
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
